apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: xae-traefik
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.io
    chart: traefik
    targetRevision: 34.0.0
    helm:
      values: |
        deployment:
          replicas: 1
        service:
          type: LoadBalancer
  destination:
    server: https://kubernetes.default.svc
    namespace: infrastructure
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
