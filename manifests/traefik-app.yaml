apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: xae-traefik
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 34.0.0
    helm:
      values: |
        deployment:
          replicas: 1
        service:
          type: LoadBalancer
        ports:
          web:
            expose: true
            port: 80
          websecure:
            expose: true
            port: 443
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
